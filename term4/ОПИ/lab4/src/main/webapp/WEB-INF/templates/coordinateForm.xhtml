<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">

<ui:composition>
    <div class="coordinate-panel">
        <div class="grid">
            <div class="col-12 md:col-4">
                <div class="input-group">
                    <p:outputLabel for="xCoord" value="X coordinate:" styleClass="input-label"/>
                    <p:selectOneMenu id="xCoord" value="#{pointBean.x}" styleClass="w-full">
                        <f:selectItem itemLabel="Select X" itemValue="#{null}" noSelectionOption="true"/>
                        <f:selectItem itemLabel="-3" itemValue="-3"/>
                        <f:selectItem itemLabel="-2" itemValue="-2"/>
                        <f:selectItem itemLabel="-1" itemValue="-1"/>
                        <f:selectItem itemLabel="0" itemValue="0"/>
                        <f:selectItem itemLabel="1" itemValue="1"/>
                        <f:selectItem itemLabel="2" itemValue="2"/>
                        <f:selectItem itemLabel="3" itemValue="3"/>
                        <f:selectItem itemLabel="4" itemValue="4"/>
                        <f:selectItem itemLabel="5" itemValue="5"/>
                    </p:selectOneMenu>
                </div>
            </div>
            <div class="col-12 md:col-4">
                <div class="input-group">
                    <p:outputLabel for="yCoord" value="Y coordinate:" styleClass="input-label"/>
                    <p:inputText id="yCoord" value="#{pointBean.y}" styleClass="w-full">
                        <f:validateDoubleRange minimum="-5" maximum="5"/>
                    </p:inputText>
                    <p:message for="yCoord"/>
                </div>
            </div>
            <div class="col-12 md:col-4">
                <div class="input-group">
                    <p:outputLabel for="radius" value="Radius:" styleClass="input-label"/>
                    <p:selectOneMenu id="radius" value="#{pointBean.radius}" styleClass="w-full"
                                     onchange="handleRadiusChange(this.value)">
                        <f:selectItem itemLabel="Select R" itemValue="#{null}" noSelectionOption="true"/>
                        <f:selectItem itemLabel="1" itemValue="1"/>
                        <f:selectItem itemLabel="2" itemValue="2"/>
                        <f:selectItem itemLabel="3" itemValue="3"/>
                        <f:selectItem itemLabel="4" itemValue="4"/>
                        <f:selectItem itemLabel="5" itemValue="5"/>
                    </p:selectOneMenu>
                </div>
            </div>
        </div>

        <div class="flex justify-content-center gap-3 p-3">
            <p:commandButton id="submitButton" value="Check Point" icon="pi pi-check"
                             action="#{pointBean.checkPoint}"
                             update="resultsTable"
                             oncomplete="drawPoints()"
                             styleClass="ui-button-success custom-button"/>
            <p:commandButton value="Clear All Points" icon="pi pi-trash"
                             action="#{pointBean.clearPoints}"
                             update="resultsTable"
                             oncomplete="drawPoints()"
                             styleClass="ui-button-danger custom-button"/>
        </div>
    </div>
</ui:composition>
</html>
